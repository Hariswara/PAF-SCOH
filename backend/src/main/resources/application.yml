spring:
  application:
    name: smart-campus

  datasource:
    url: ${NEON_DB_URL}
    username: ${NEON_DB_USER}
    password: ${NEON_DB_PASS}


    jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always
      platform: postgresql
      continue-on-error: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

smartcampus:
  auth:
    initial-admin-email: ${INITIAL_ADMIN_EMAIL:admin@example.com}
  webauthn:
    rp-id: ${WEBAUTHN_RP_ID:localhost}
    rp-name: ${WEBAUTHN_RP_NAME:Smart Campus Hub}
    rp-origin: ${WEBAUTHN_RP_ORIGIN:http://localhost:5173}

server:
  port: 8080

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
